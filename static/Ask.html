<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ASK ME</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
    </style>
<body>
    <nav class="navbar navbar-expand-lg bg-body-secondary">
      <div class="container-fluid">
          <div class="d-flex w-100 justify-content-between align-items-center">
              <a class="navbar-brand" href="Ask.html">ASKME KUZNECOV</a>

              <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                  aria-expanded="false" aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
              </button>

              <form class="d-flex" role="search">
                  <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                  <button class="btn btn-outline-success" type="submit">Ask</button>
              </form>

              <div class="d-flex gap-4">
                  <div>
                      <a href="#">log in</a>
                      <a href="#">register</a>
                  </div>
              </div>
          </div>
      </div>
  </nav>
  <main class = "container mt-3">
        <div class="d-flex gap-3 align-items-center">
            <h1>New Question</h1>
        </div>

        <div class="row">
            <div class="col-9">
                <div class = "d-flex flex-column gap-4">
                    <div class ="card w-100" style="width: 18rem;">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text" id="TitleInput">Title</span>
                            <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
                        </div>
                    </div>


                    <div class="card w-100" style="width: 18rem;">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text" id="TextInput">Text</span>
                            <input type="text" class="form-control form-control-lg" style="height: 400px;" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
                        </div>
                    </div>


                    <div class ="card w-100" style="width: 18rem;">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text" id="Tags">Tags</span>
                            <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
                        </div>
                    </div>

                <button type="button" class="btn btn-secondary btn-lg">Large button</button>
            </div>
        </div>
            <div class="col-3">
            <section class="mb-2">
              <h2>Popular Tags</h2>
              <div class="col">
                  <span class="text-secondary p-3">perl</span>
                  <span class="text-danger p-3">python</span>
                  <span class="text-dark p-3">TechnoPark</span>
                  <span class="text-danger p-3">MySQL</span>
                  <span class="text-success p-3">django</span>
                  <span class="text-dark p-3">Mail.ru</span>
                  <span class="text-dark p-3">Voloshin</span>
                  <span class="text-warning p-3">Firefox</span>
              </div>
          </section>





              <section>
                  <h2>Best members</h2>
                  <div>
                      <ul class="list-group list-group-flush">
                          <li class="list-group-item"><a href="#">Mr.Freeman</a></li>
                          <li class="list-group-item"><a href="#">Dr.House</a></li>
                          <li class="list-group-item"><a href="#">Bender</a></li>
                          <li class="list-group-item"><a href="#">Queen Victoria</a></li>
                          <li class="list-group-item"><a href="#">V.Pupkin</a></li>
                      </ul>
                  </div>
              </section>

          </div>
     </div>
  </main>
  <script src="/js/bootstrap.min.js"></script>

</html>
